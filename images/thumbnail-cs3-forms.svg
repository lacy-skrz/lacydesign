<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Texas School District Forms Project case study thumbnail">
  <defs>
    <pattern id="grid3" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#A05A4A"/>
  <rect width="600" height="400" fill="url(#grid3)"/>

  <!-- Ambient -->
  <ellipse cx="540" cy="50"  rx="210" ry="180" fill="#8A4A3A" opacity="0.5"/>
  <ellipse cx="60"  cy="370" rx="170" ry="150" fill="#8A4A3A" opacity="0.4"/>

  <!-- ── CONDITIONAL BRANCHING FORM FLOW ── -->

  <!-- Root node -->
  <rect x="240" y="40" width="120" height="40" rx="6" fill="#ffffff" opacity="0.15"/>
  <rect x="240" y="40" width="120" height="40" rx="6" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>

  <!-- Root connector down -->
  <line x1="300" y1="80" x2="300" y2="115" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>

  <!-- Decision diamond -->
  <polygon points="300,115 340,145 300,175 260,145" fill="#C07060" opacity="0.8"/>
  <polygon points="300,115 340,145 300,175 260,145" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>

  <!-- Branch left — YES -->
  <line x1="260" y1="145" x2="150" y2="145" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>
  <line x1="150" y1="145" x2="150" y2="200" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>

  <!-- Branch right — NO -->
  <line x1="340" y1="145" x2="450" y2="145" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>
  <line x1="450" y1="145" x2="450" y2="200" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>

  <!-- Left branch node -->
  <rect x="95"  y="200" width="110" height="36" rx="5" fill="#ffffff" opacity="0.13"/>
  <rect x="95"  y="200" width="110" height="36" rx="5" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.35"/>

  <!-- Right branch node -->
  <rect x="395" y="200" width="110" height="36" rx="5" fill="#ffffff" opacity="0.13"/>
  <rect x="395" y="200" width="110" height="36" rx="5" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.35"/>

  <!-- Left branch continues — second decision -->
  <line x1="150" y1="236" x2="150" y2="265" stroke="#ffffff" stroke-width="1.2" opacity="0.2"/>
  <polygon points="150,265 178,285 150,305 122,285" fill="#C07060" opacity="0.65"/>
  <polygon points="150,265 178,285 150,305 122,285" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.3"/>

  <!-- Left-left leaf -->
  <line x1="122" y1="285" x2="75" y2="285"  stroke="#ffffff" stroke-width="1.2" opacity="0.18"/>
  <line x1="75"  y1="285" x2="75" y2="330"  stroke="#ffffff" stroke-width="1.2" opacity="0.18"/>
  <rect x="42"  y="330" width="66" height="28" rx="4" fill="#C07060" opacity="0.55"/>

  <!-- Left-right leaf -->
  <line x1="178" y1="285" x2="230" y2="285" stroke="#ffffff" stroke-width="1.2" opacity="0.18"/>
  <line x1="230" y1="285" x2="230" y2="330" stroke="#ffffff" stroke-width="1.2" opacity="0.18"/>
  <rect x="197" y="330" width="66" height="28" rx="4" fill="#C07060" opacity="0.55"/>

  <!-- Right branch continues — second decision -->
  <line x1="450" y1="236" x2="450" y2="265" stroke="#ffffff" stroke-width="1.2" opacity="0.2"/>
  <polygon points="450,265 478,285 450,305 422,285" fill="#C07060" opacity="0.65"/>
  <polygon points="450,265 478,285 450,305 422,285" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.3"/>

  <!-- Right-left leaf -->
  <line x1="422" y1="285" x2="370" y2="285" stroke="#ffffff" stroke-width="1.2" opacity="0.18"/>
  <line x1="370" y1="285" x2="370" y2="330" stroke="#ffffff" stroke-width="1.2" opacity="0.18"/>
  <rect x="337" y="330" width="66" height="28" rx="4" fill="#C07060" opacity="0.55"/>

  <!-- Right-right leaf -->
  <line x1="478" y1="285" x2="525" y2="285" stroke="#ffffff" stroke-width="1.2" opacity="0.18"/>
  <line x1="525" y1="285" x2="525" y2="330" stroke="#ffffff" stroke-width="1.2" opacity="0.18"/>
  <rect x="492" y="330" width="66" height="28" rx="4" fill="#C07060" opacity="0.55"/>

  <!-- Down from root decision — centre path (SKIP) -->
  <line x1="300" y1="175" x2="300" y2="200" stroke="#ffffff" stroke-width="1.2" opacity="0.2"/>
  <rect x="255" y="200" width="90" height="36" rx="5" fill="#ffffff" opacity="0.2"/>
  <rect x="255" y="200" width="90" height="36" rx="5" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>

  <!-- Hidden/skipped row indicator -->
  <line x1="300" y1="236" x2="300" y2="265" stroke="#ffffff" stroke-width="1.2" opacity="0.15" stroke-dasharray="5 3"/>
  <rect x="265" y="265" width="70" height="28" rx="4" fill="#ffffff" opacity="0.07"/>
  <rect x="265" y="265" width="70" height="28" rx="4" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="4 3" opacity="0.25"/>
</svg>
