<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dashboard Redesign case study thumbnail">
  <defs>
    <pattern id="grid4" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#4E5E6B"/>
  <rect width="600" height="400" fill="url(#grid4)"/>

  <!-- Ambient -->
  <ellipse cx="530" cy="50"  rx="210" ry="180" fill="#3d4e5b" opacity="0.55"/>
  <ellipse cx="70"  cy="370" rx="160" ry="140" fill="#3d4e5b" opacity="0.45"/>

  <!-- ── BAR CHART (left) ── -->
  <!-- Chart card -->
  <rect x="50" y="60" width="250" height="260" rx="8" fill="#ffffff" opacity="0.07"/>
  <rect x="50" y="60" width="250" height="260" rx="8" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.14"/>

  <!-- Horizontal grid lines -->
  <line x1="80" y1="280" x2="280" y2="280" stroke="#ffffff" stroke-width="1"   opacity="0.18"/>
  <line x1="80" y1="244" x2="280" y2="244" stroke="#ffffff" stroke-width="0.5" opacity="0.09" stroke-dasharray="4 4"/>
  <line x1="80" y1="208" x2="280" y2="208" stroke="#ffffff" stroke-width="0.5" opacity="0.09" stroke-dasharray="4 4"/>
  <line x1="80" y1="172" x2="280" y2="172" stroke="#ffffff" stroke-width="0.5" opacity="0.09" stroke-dasharray="4 4"/>
  <line x1="80" y1="136" x2="280" y2="136" stroke="#ffffff" stroke-width="0.5" opacity="0.09" stroke-dasharray="4 4"/>

  <!-- Group By pill -->
  <rect x="74" y="80" width="58" height="16" rx="3" fill="#ffffff" opacity="0.1"/>
  <rect x="138" y="80" width="44" height="16" rx="3" fill="#4A90B8" opacity="0.7"/>

  <!-- Stacked bars: 5 entities, blue + pink -->
  <rect x="88"  y="210" width="26" height="70" rx="2" fill="#4A90B8" opacity="0.9"/>
  <rect x="88"  y="186" width="26" height="24" rx="2" fill="#E8899A" opacity="0.85"/>

  <rect x="124" y="222" width="26" height="58" rx="2" fill="#4A90B8" opacity="0.9"/>
  <rect x="124" y="200" width="26" height="22" rx="2" fill="#E8899A" opacity="0.85"/>

  <rect x="160" y="196" width="26" height="84" rx="2" fill="#4A90B8" opacity="0.9"/>
  <rect x="160" y="166" width="26" height="30" rx="2" fill="#E8899A" opacity="0.85"/>

  <rect x="196" y="204" width="26" height="76" rx="2" fill="#4A90B8" opacity="0.9"/>
  <rect x="196" y="178" width="26" height="26" rx="2" fill="#E8899A" opacity="0.85"/>

  <rect x="232" y="220" width="26" height="60" rx="2" fill="#4A90B8" opacity="0.9"/>
  <rect x="232" y="200" width="26" height="20" rx="2" fill="#E8899A" opacity="0.85"/>

  <!-- ── PIE CHART (right) ── -->
  <rect x="330" y="60" width="220" height="190" rx="8" fill="#ffffff" opacity="0.07"/>
  <rect x="330" y="60" width="220" height="190" rx="8" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.14"/>

  <!-- Pie — 60/40 split -->
  <path d="M440 155 L440 107 A48 48 0 1 1 399.5 200.6 Z" fill="#4A90B8" opacity="0.9"/>
  <path d="M440 155 L399.5 200.6 A48 48 0 0 1 440 107 Z"  fill="#E8899A" opacity="0.82"/>

  <!-- ── TOOLTIP ── -->
  <rect x="348" y="108" width="100" height="54" rx="5" fill="#1C1C1C" opacity="0.85"/>
  <rect x="358" y="120" width="7" height="7" rx="1" fill="#E8899A"/>
  <rect x="358" y="133" width="60" height="5" rx="2" fill="#ffffff" opacity="0.35"/>
  <rect x="358" y="143" width="45" height="5" rx="2" fill="#ffffff" opacity="0.25"/>

  <!-- ── BREADCRUMB strip ── -->
  <rect x="330" y="270" width="220" height="28" rx="6" fill="#ffffff" opacity="0.07"/>
  <rect x="330" y="270" width="220" height="28" rx="6" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.14"/>
  <rect x="346" y="281" width="48" height="6" rx="2" fill="#4A90B8" opacity="0.7"/>
  <rect x="404" y="281" width="6"  height="6" rx="1" fill="#ffffff" opacity="0.2"/>
  <rect x="418" y="281" width="60" height="6" rx="2" fill="#ffffff" opacity="0.3"/>

  <!-- ── DRILLDOWN mini chart (bottom right) ── -->
  <rect x="330" y="316" width="220" height="84" rx="8" fill="#ffffff" opacity="0.07"/>
  <rect x="330" y="316" width="220" height="84" rx="8" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.14"/>

  <!-- Small bar chart inside drilldown -->
  <rect x="352" y="350" width="18" height="32" rx="2" fill="#4A90B8" opacity="0.7"/>
  <rect x="352" y="340" width="18" height="10" rx="2" fill="#E8899A" opacity="0.65"/>
  <rect x="378" y="358" width="18" height="24" rx="2" fill="#4A90B8" opacity="0.7"/>
  <rect x="378" y="348" width="18" height="10" rx="2" fill="#E8899A" opacity="0.65"/>
  <rect x="404" y="344" width="18" height="38" rx="2" fill="#4A90B8" opacity="0.7"/>
  <rect x="404" y="334" width="18" height="10" rx="2" fill="#E8899A" opacity="0.65"/>
  <rect x="430" y="354" width="18" height="28" rx="2" fill="#4A90B8" opacity="0.7"/>
  <rect x="430" y="344" width="18" height="10" rx="2" fill="#E8899A" opacity="0.65"/>
  <rect x="456" y="348" width="18" height="34" rx="2" fill="#4A90B8" opacity="0.7"/>
  <rect x="456" y="338" width="18" height="10" rx="2" fill="#E8899A" opacity="0.65"/>
  <line x1="346" y1="382" x2="486" y2="382" stroke="#ffffff" stroke-width="0.8" opacity="0.15"/>
</svg>
